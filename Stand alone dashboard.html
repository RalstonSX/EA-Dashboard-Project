<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Dashboard Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .dashboard-card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* Custom scrollbars for the table */
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark .table-container::-webkit-scrollbar-thumb { background: #475569; }
        .dark .table-container::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#f9fafb] text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20">
        <div class="max-w-[95%] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-lg bg-brand-500 text-white flex items-center justify-center mr-3 shadow-sm">
                        <i class="fa-solid fa-rocket"></i>
                    </div>
                    <h1 class="text-xl font-bold text-gray-900 dark:text-white truncate tracking-tight">Task Overview</h1>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Toggle Light/Dark Theme">
                        <svg id="sunIcon" class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 3.22a1 1 0 011.415 0l.884.884a1 1 0 01-1.414 1.415l-.884-.884a1 1 0 010-1.415zM1 10a1 1 0 011-1h1a1 1 0 110 2H2a1 1 0 01-1-1zm15 0a1 1 0 011-1h1a1 1 0 110 2h-1a1 1 0 01-1-1zm-4.22 4.22a1 1 0 011.415 0l.884.884a1 1 0 01-1.414 1.415l-.884-.884a1 1 0 010-1.415zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-3.22a1 1 0 010-1.415l-.884-.884a1 1 0 011.414-1.415l.884.884a1 1 0 01-1.415 1.415zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
                        </svg>
                        <svg id="moonIcon" class="w-5 h-5 block dark:hidden text-gray-600" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-[95%] w-full mx-auto px-4 py-8 flex flex-col gap-6">
        
        <section id="filterSection" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5 flex flex-col sm:flex-row flex-wrap items-end gap-4 z-10 relative">
            <div class="w-full sm:w-auto flex-grow max-w-xs">
                <label for="filterWorkstream" class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Workstream</label>
                <select id="filterWorkstream" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block p-2.5 outline-none transition-colors">
                    <option value="All">All Workstreams</option>
                </select>
            </div>
            <div class="w-full sm:w-auto flex-grow max-w-xs">
                <label for="filterStatus" class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Status</label>
                <select id="filterStatus" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block p-2.5 outline-none transition-colors">
                    <option value="All">All Statuses</option>
                </select>
            </div>
            <div class="w-full sm:w-auto flex-grow max-w-xs">
                <label for="filterOwner" class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Owner</label>
                <select id="filterOwner" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block p-2.5 outline-none transition-colors">
                    <option value="All">All Owners</option>
                </select>
            </div>
            <div class="w-full sm:w-auto flex-grow max-w-xs">
                <label for="filterPriority" class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Priority</label>
                <select id="filterPriority" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-brand-500 focus:border-brand-500 block p-2.5 outline-none transition-colors">
                    <option value="All">All Priorities</option>
                </select>
            </div>
            <div class="w-full sm:w-auto pt-2">
                <button id="clearFiltersBtn" class="w-full sm:w-auto px-4 py-2.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 text-sm font-medium rounded-lg transition-colors border border-transparent dark:border-gray-600">
                    <i class="fa-solid fa-rotate-left mr-2"></i>Reset
                </button>
            </div>
        </section>

        <section id="dashboardSection" class="flex flex-col gap-6 transition-opacity duration-500 ease-in-out">
            <!-- KPI Row -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5 flex items-center">
                    <div class="p-3.5 rounded-full bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 mr-4">
                        <i class="fa-solid fa-list-check text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Tasks in View</p>
                        <p id="totalCount" class="text-2xl font-bold text-gray-900 dark:text-white">0</p>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5 flex items-center">
                    <div class="p-3.5 rounded-full bg-red-50 text-red-600 dark:bg-red-900/30 dark:text-red-400 mr-4">
                        <i class="fa-solid fa-triangle-exclamation text-xl"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Blocked Tasks</p>
                        <p id="blockedCount" class="text-2xl font-bold text-red-600 dark:text-red-400 truncate">0</p>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5 flex items-center">
                    <div class="p-3.5 rounded-full bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400 mr-4">
                        <i class="fa-solid fa-chart-line text-xl"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Most Frequent</p>
                        <p id="mostFrequentStatus" class="text-xl font-bold text-gray-900 dark:text-white truncate">-</p>
                    </div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5 flex items-center">
                    <div class="p-3.5 rounded-full bg-purple-50 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400 mr-4">
                        <i class="fa-regular fa-clock text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Last Updated</p>
                        <p id="lastUpdatedTime" class="text-lg font-bold text-gray-900 dark:text-white">Just now</p>
                    </div>
                </div>
            </div>

            <!-- Detailed Table -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden flex flex-col">
                <div class="px-6 py-5 border-b border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/80 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white"><i class="fa-solid fa-table-list text-gray-400 mr-2"></i>Task Log</h3>
                    <span class="text-xs font-semibold bg-gray-200 dark:bg-gray-700 px-2.5 py-1 rounded text-gray-700 dark:text-gray-300 shadow-sm" id="tableRecordCount">0 Records</span>
                </div>
                <div class="overflow-x-auto table-container flex-grow max-h-[500px] relative">
                    <table class="min-w-full text-left text-sm whitespace-nowrap">
                        <thead class="uppercase text-xs tracking-wider font-semibold text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-gray-900/50 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium">Workstream</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium w-1/4">Task</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium">Owner</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium">Status</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium">Priority</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium">Due Date</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium">Escalation</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium w-1/5">Blocker</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium w-1/5">Next Step</th>
                                <th scope="col" class="px-4 py-4 border-b border-gray-200 dark:border-gray-700 font-medium w-1/5">Latest Update</th>
                            </tr>
                        </thead>
                        <tbody id="detailedTableBody" class="divide-y divide-gray-100 dark:divide-gray-800 bg-white dark:bg-gray-800">
                            <!-- Table rows injected via JS -->
                        </tbody>
                    </table>
                    
                    <!-- Empty State for Filters -->
                    <div id="emptyState" class="hidden py-16 flex-col items-center justify-center text-center">
                        <i class="fa-solid fa-filter-circle-xmark text-4xl text-gray-300 dark:text-gray-600 mb-4"></i>
                        <p class="text-gray-500 dark:text-gray-400 font-medium">No tasks match your current filters.</p>
                        <button class="mt-2 text-brand-600 hover:text-brand-700 dark:text-brand-400 text-sm font-medium" onclick="document.getElementById('clearFiltersBtn').click()">Clear all filters</button>
                    </div>
                </div>
            </div>

            <!-- Summary Section -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 dashboard-card">
                <div class="flex justify-between items-center mb-4 border-b border-gray-100 dark:border-gray-700 pb-3">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100">Summary</h3>
                </div>
                <div class="prose dark:prose-invert max-w-none text-sm text-gray-600 dark:text-gray-300 flex-grow overflow-y-auto pr-2 no-scrollbar" id="summaryText">
                    <!-- Summary injected via JS -->
                </div>
            </div>

        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Hardcoded Data Based on Project Specs ---
            const initialData = [
                { Workstream: "Zurp", Task: "Safari Checkout Bug", Owner: "Dev", Status: "Blocked", Priority: "Urgent", "Due Date": "Today", Escalation: "Yes", Blocker: "Fails on mobile Safari", "Next Step": "QA test and patch update", "Latest Update": "Critical live bug in production" },
                { Workstream: "Zurp", Task: "Subscription UI Glitch", Owner: "Dev", Status: "Delayed", Priority: "Urgent", "Due Date": "Today", Escalation: "No", Blocker: "-", "Next Step": "Investigate and fix JS logic", "Latest Update": "Variant logic breaking interface" },
                { Workstream: "Zurp", Task: "Discount Code Failures", Owner: "Support / Dev", Status: "Delayed", Priority: "Urgent", "Due Date": "Today", Escalation: "No", Blocker: "-", "Next Step": "Triage backend configuration", "Latest Update": "12 cases reported" },
                { Workstream: "After Ours", Task: "Customs Clearance", Owner: "Supply", Status: "Blocked", Priority: "Urgent", "Due Date": "ASAP", Escalation: "Yes", Blocker: "Missing commercial invoice", "Next Step": "Dispatch invoice to logistics", "Latest Update": "Freight forwarder holding shipment" },
                { Workstream: "After Ours", Task: "Mass Production Packaging", Owner: "Supply", Status: "Blocked", Priority: "Urgent", "Due Date": "ASAP", Escalation: "Yes", Blocker: "Requires dimensions, barcodes, card approval", "Next Step": "Approve insert card & specs", "Latest Update": "Supplier production halted" },
                { Workstream: "Marketing", Task: "Paid Media Assets", Owner: "Marketing", Status: "Blocked", Priority: "High", "Due Date": "TBD", Escalation: "Yes", Blocker: "Missing final URL, claims, images", "Next Step": "Finalize launch date", "Latest Update": "Team on standby" },
                { Workstream: "Marketing", Task: "Final Product Photos", Owner: "Vendor", Status: "Delayed", Priority: "Urgent", "Due Date": "Friday", Escalation: "Yes", Blocker: "Vendor unresponsive 48 hours", "Next Step": "Direct escalation (phone call)", "Latest Update": "Risk to launch ads and emails" },
                { Workstream: "Zurp", Task: "QA Site Checklist", Owner: "Unassigned", Status: "Decisions Needed", Priority: "High", "Due Date": "Today", Escalation: "Yes", Blocker: "Lacks assigned owner", "Next Step": "Nik/Rameez to finalize assignment", "Latest Update": "Downstream bottleneck risk" },
                { Workstream: "Marketing", Task: "Email/SMS Copy Review", Owner: "Unassigned", Status: "Decisions Needed", Priority: "High", "Due Date": "Today", Escalation: "Yes", Blocker: "Lacks assigned owner", "Next Step": "Nik/Rameez to finalize assignment", "Latest Update": "Drafting completed" },
                { Workstream: "Zurp", Task: "System Uptime Monitor", Owner: "Dev", Status: "On Track", Priority: "Medium", "Due Date": "Ongoing", Escalation: "No", Blocker: "-", "Next Step": "Maintain tracking", "Latest Update": "Systems operating normally" }
            ];

            // --- State Variables ---
            let appData = {
                raw: initialData,
                filtered: [...initialData],
                statusCounts: {},
                totalRecords: 0,
                blockedCount: 0
            };

            // --- Elements ---
            const themeToggle = document.getElementById('themeToggle');
            const htmlClassList = document.documentElement.classList;
            
            // Filter Elements
            const filterWorkstream = document.getElementById('filterWorkstream');
            const filterStatus = document.getElementById('filterStatus');
            const filterOwner = document.getElementById('filterOwner');
            const filterPriority = document.getElementById('filterPriority');
            const clearFiltersBtn = document.getElementById('clearFiltersBtn');
            const emptyState = document.getElementById('emptyState');

            // --- Theme Management ---
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlClassList.add('dark');
            } else {
                htmlClassList.remove('dark');
            }

            themeToggle.addEventListener('click', () => {
                htmlClassList.toggle('dark');
                const isDark = htmlClassList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

            // --- Utility Functions ---
            const getVal = (row, ...keys) => {
                for (let key of keys) {
                    if (row[key] !== undefined) return String(row[key]).trim();
                }
                return '-';
            };

            const getStyle = (type, value) => {
                const val = (value || '').toLowerCase().trim();
                if (type === 'workstream') {
                    if (val.includes('zurp')) return 'bg-blue-100 text-blue-800 border border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800';
                    if (val.includes('after ours')) return 'bg-purple-100 text-purple-800 border border-purple-200 dark:bg-purple-900/30 dark:text-purple-300 dark:border-purple-800';
                    if (val.includes('marketing')) return 'bg-pink-100 text-pink-800 border border-pink-200 dark:bg-pink-900/30 dark:text-pink-300 dark:border-pink-800';
                    return 'bg-gray-100 text-gray-800 border border-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600';
                }
                if (type === 'status') {
                    if (val.includes('blocked')) return 'bg-red-100 text-red-800 border border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800';
                    if (val.includes('delayed') || val.includes('urgent')) return 'bg-amber-100 text-amber-800 border border-amber-200 dark:bg-amber-900/30 dark:text-amber-400 dark:border-amber-800';
                    if (val.includes('on track')) return 'bg-emerald-100 text-emerald-800 border border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800';
                    if (val.includes('decisions needed')) return 'bg-indigo-100 text-indigo-800 border border-indigo-200 dark:bg-indigo-900/30 dark:text-indigo-400 dark:border-indigo-800';
                    return 'bg-gray-100 text-gray-800 border border-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600';
                }
                if (type === 'priority') {
                    if (val === 'urgent') return 'text-red-600 font-bold dark:text-red-400';
                    if (val === 'high') return 'text-amber-600 font-semibold dark:text-amber-400';
                    if (val === 'medium') return 'text-blue-600 font-medium dark:text-blue-400';
                    return 'text-gray-500 dark:text-gray-400';
                }
                if (type === 'escalation') {
                    if (val === 'yes') return 'bg-red-500 text-white border border-red-600 shadow-sm dark:border-red-400';
                    return 'bg-gray-200 text-gray-700 border border-gray-300 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600';
                }
                return '';
            };

            function initializeFilters() {
                const workstreams = new Set();
                const statuses = new Set();
                const owners = new Set();
                const priorities = new Set();

                appData.raw.forEach(row => {
                    workstreams.add(getVal(row, 'Workstream'));
                    statuses.add(getVal(row, 'Status'));
                    owners.add(getVal(row, 'Owner'));
                    priorities.add(getVal(row, 'Priority'));
                });

                const populateSelect = (select, set) => {
                    Array.from(set).sort().forEach(item => {
                        if(item !== '-') {
                            const option = document.createElement('option');
                            option.value = item;
                            option.textContent = item;
                            select.appendChild(option);
                        }
                    });
                };

                populateSelect(filterWorkstream, workstreams);
                populateSelect(filterStatus, statuses);
                populateSelect(filterOwner, owners);
                populateSelect(filterPriority, priorities);

                // Add Event Listeners
                [filterWorkstream, filterStatus, filterOwner, filterPriority].forEach(el => {
                    el.addEventListener('change', applyFilters);
                });

                clearFiltersBtn.addEventListener('click', () => {
                    filterWorkstream.value = 'All';
                    filterStatus.value = 'All';
                    filterOwner.value = 'All';
                    filterPriority.value = 'All';
                    applyFilters();
                });
            }

            function applyFilters() {
                const ws = filterWorkstream.value;
                const status = filterStatus.value;
                const owner = filterOwner.value;
                const priority = filterPriority.value;

                appData.filtered = appData.raw.filter(row => {
                    const mWs = ws === 'All' || getVal(row, 'Workstream') === ws;
                    const mSt = status === 'All' || getVal(row, 'Status') === status;
                    const mOw = owner === 'All' || getVal(row, 'Owner') === owner;
                    const mPr = priority === 'All' || getVal(row, 'Priority') === priority;
                    return mWs && mSt && mOw && mPr;
                });

                processDataMetrics();
            }

            function processDataMetrics() {
                const data = appData.filtered;
                appData.totalRecords = data.length;
                
                let counts = {};
                let blocked = 0;
                
                data.forEach(row => {
                    let st = getVal(row, 'Status');
                    if (st === '-') st = 'Uncategorized';
                    counts[st] = (counts[st] || 0) + 1;
                    if (st.toLowerCase().includes('block')) blocked++;
                });

                const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
                
                appData.statusCounts = {
                    labels: sorted.map(i => i[0]),
                    values: sorted.map(i => i[1])
                };
                appData.blockedCount = blocked;

                renderDashboard();
            }

            function renderDashboard() {
                // Update KPIs
                document.getElementById('totalCount').textContent = appData.totalRecords;
                document.getElementById('blockedCount').textContent = appData.blockedCount;
                document.getElementById('mostFrequentStatus').textContent = appData.statusCounts.labels[0] || 'N/A';
                document.getElementById('lastUpdatedTime').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('tableRecordCount').textContent = `${appData.totalRecords} Records`;

                buildSummary();
                buildDetailedTable();
            }

            function buildSummary() {
                const container = document.getElementById('summaryText');
                const s = appData.statusCounts;
                
                if (appData.totalRecords === 0) {
                    container.innerHTML = `<p class="text-gray-500 italic">No data available for the selected filters.</p>`;
                    return;
                }

                let html = `<ul class="list-disc pl-5 space-y-1 mb-4">`;
                for(let i = 0; i < s.labels.length; i++) {
                    const isBlocked = s.labels[i].toLowerCase().includes('block');
                    const textStyle = isBlocked ? 'text-red-600 dark:text-red-400 font-bold' : '';
                    html += `<li class="${textStyle}"><strong>${s.labels[i]}:</strong> ${s.values[i]} items</li>`;
                }
                html += `</ul>`;
                
                container.innerHTML = html;
            }

            function buildDetailedTable() {
                const tbody = document.getElementById('detailedTableBody');
                tbody.innerHTML = '';
                
                if (appData.totalRecords === 0) {
                    emptyState.classList.remove('hidden');
                    emptyState.classList.add('flex');
                    return;
                } else {
                    emptyState.classList.add('hidden');
                    emptyState.classList.remove('flex');
                }

                appData.filtered.forEach((row, i) => {
                    const ws = getVal(row, 'Workstream');
                    const task = getVal(row, 'Task');
                    let owner = getVal(row, 'Owner');
                    if(owner === '-') owner = 'Unassigned';
                    const initials = owner !== 'Unassigned' ? owner.substring(0, 2).toUpperCase() : '?';
                    
                    const status = getVal(row, 'Status');
                    const priority = getVal(row, 'Priority');
                    const dueDate = getVal(row, 'Due Date');
                    const escalation = getVal(row, 'Escalation');
                    const blocker = getVal(row, 'Blocker');
                    const nextStep = getVal(row, 'Next Step');
                    const update = getVal(row, 'Latest Update');

                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors group';
                    
                    tr.innerHTML = `
                        <td class="px-4 py-4 align-top">
                            <span class="${getStyle('workstream', ws)} px-2.5 py-1 rounded text-xs font-semibold whitespace-nowrap">${ws}</span>
                        </td>
                        <td class="px-4 py-4 font-medium text-gray-900 dark:text-gray-100 whitespace-normal align-top leading-relaxed min-w-[200px]">
                            ${task}
                        </td>
                        <td class="px-4 py-4 align-top">
                            <div class="flex items-center">
                                <div class="w-7 h-7 rounded-full bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 flex items-center justify-center text-xs mr-2.5 font-bold shadow-sm">${initials}</div>
                                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">${owner}</span>
                            </div>
                        </td>
                        <td class="px-4 py-4 align-top">
                            <span class="${getStyle('status', status)} px-2.5 py-1 rounded-md text-xs font-bold whitespace-nowrap inline-flex items-center">
                                ${status.toLowerCase() === 'blocked' ? '<i class="fa-solid fa-ban mr-1.5 opacity-75"></i>' : ''}
                                ${status.toLowerCase() === 'on track' ? '<i class="fa-solid fa-check mr-1.5 opacity-75"></i>' : ''}
                                ${status}
                            </span>
                        </td>
                        <td class="px-4 py-4 align-top">
                            <span class="${getStyle('priority', priority)} flex items-center text-sm capitalize">
                                ${priority.toLowerCase() === 'urgent' ? '<i class="fa-solid fa-fire mr-1.5"></i>' : ''}
                                ${priority}
                            </span>
                        </td>
                        <td class="px-4 py-4 text-gray-800 dark:text-gray-300 text-sm align-top whitespace-nowrap font-medium">${dueDate}</td>
                        <td class="px-4 py-4 align-top">
                            <span class="${getStyle('escalation', escalation)} px-2.5 py-0.5 rounded text-xs font-bold uppercase tracking-wider">${escalation}</span>
                        </td>
                        <td class="px-4 py-4 text-gray-600 dark:text-gray-400 text-sm whitespace-normal align-top leading-relaxed min-w-[200px]">
                            ${blocker !== '-' ? blocker : '<span class="text-gray-300 dark:text-gray-600 italic">None</span>'}
                        </td>
                        <td class="px-4 py-4 text-gray-800 dark:text-gray-200 text-sm whitespace-normal align-top leading-relaxed min-w-[200px] font-medium">
                            ${nextStep}
                        </td>
                        <td class="px-4 py-4 text-gray-500 dark:text-gray-400 text-xs whitespace-normal align-top leading-relaxed min-w-[200px] bg-gray-50/50 dark:bg-gray-800/30 group-hover:bg-transparent transition-colors rounded-r-lg">
                            ${update}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // Initialization
            initializeFilters();
            processDataMetrics(); // Bootstraps the first render
        });
    </script>
</body>
</html>
